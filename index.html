<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ Vibe Check Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="app">
      <div id="screen-start" class="screen">

        
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <h1>✨ Vibe Check<br />Machine</h1>
        <p class="subtitle">5 questions. 1 truth. Are you ready?</p>
        <button id="start-btn" onclick="startQuiz()">Let's Go! 🚀</button>
      </div>

      <div id="screen-quiz" class="screen hidden">
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <p id="question-counter">Question 1 of 5</p>
        <div id="question-card">
          <p id="question-text">Question goes here</p>
          <div id="choices-container"></div>
        </div>
      </div>

      <div id="screen-result" class="screen hidden">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <h2>Your Vibe is...</h2>
        <div id="result-card">
          <div id="result-emoji"></div>
          <h3 id="result-title"></h3>
          <p id="result-desc"></p>
        </div>
        <button id="restart-btn" onclick="restart()">Try Again 🔄</button>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
